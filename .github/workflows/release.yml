name: Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and smoke-test without publishing a GitHub release"
        required: true
        default: true
        type: boolean

jobs:
  publish-tauri:
    permissions:
      contents: write

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Python sidecar dependencies
        run: python -m pip install -r python/requirements.txt

      - name: Verify GLiClass runtime imports
        run: python -c "from gliclass import GLiClassModel, ZeroShotClassificationPipeline; from transformers import AutoTokenizer; print('GLiClass runtime ready')"

      - name: Test local analysis and model downloads
        run: python -m unittest discover -s python -p "test_*.py"

      - name: Verify pinned model sources
        run: python python/models.py --models-dir "$env:RUNNER_TEMP\filesift-model-smoke" --verify-remote

      - name: Build Python sidecar
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconfirm --onefile --noconsole --name filesift-sidecar --collect-all transformers --collect-all torch --collect-all docling --collect-all huggingface_hub --collect-all gliclass --collect-all sklearn python/cli.py
          New-Item -ItemType Directory -Force src-tauri/binaries
          Copy-Item dist/filesift-sidecar.exe src-tauri/binaries/filesift-sidecar-x86_64-pc-windows-msvc.exe -Force

      - name: Smoke-test hidden sidecar IPC
        shell: pwsh
        run: |
          $executable = (Resolve-Path "src-tauri/binaries/filesift-sidecar-x86_64-pc-windows-msvc.exe").Path
          $modelsDir = Join-Path $env:RUNNER_TEMP "filesift-model-smoke"
          $startInfo = [System.Diagnostics.ProcessStartInfo]::new()
          $startInfo.FileName = $executable
          $startInfo.UseShellExecute = $false
          $startInfo.CreateNoWindow = $true
          $startInfo.RedirectStandardOutput = $true
          $startInfo.RedirectStandardError = $true
          $startInfo.ArgumentList.Add("models")
          $startInfo.ArgumentList.Add("--models-dir")
          $startInfo.ArgumentList.Add($modelsDir)

          $process = [System.Diagnostics.Process]::new()
          $process.StartInfo = $startInfo
          $process.Start() | Out-Null
          $stdoutTask = $process.StandardOutput.ReadToEndAsync()
          $stderrTask = $process.StandardError.ReadToEndAsync()
          $process.WaitForExit()
          $stdout = $stdoutTask.Result
          $stderr = $stderrTask.Result

          Write-Host $stdout
          if ($stderr) {
            Write-Host $stderr
          }
          if ($process.ExitCode -ne 0) {
            throw "Sidecar exited with code $($process.ExitCode)."
          }
          if ($stdout -notmatch '"event":\s*"model-status"') {
            throw "The hidden sidecar did not return model status over its stdout pipe."
          }

      - name: Validate updater signing secrets
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        shell: bash
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "Missing GitHub secret: TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]; then
            echo "Missing GitHub secret: TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build and publish Tauri release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FileSift ${{ github.ref_name }}"
          releaseBody: "See the attached installers and update manifest."
          releaseDraft: false
          prerelease: false

      - name: Dry run complete
        if: (github.event_name == 'workflow_dispatch' && inputs.dry_run) || (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request'
        run: |
          echo "Dry-run completed: model runtimes and downloader tests passed, sources were verified, and the hidden PyInstaller sidecar returned status over IPC."

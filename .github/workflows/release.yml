name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and smoke-test without publishing a GitHub release"
        required: true
        default: true
        type: boolean

jobs:
  publish-tauri:
    permissions:
      contents: write

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Python sidecar dependencies
        run: python -m pip install -r python/requirements.txt

      - name: Verify pinned model sources
        run: python python/models.py --models-dir "$env:RUNNER_TEMP\filesift-model-smoke" --verify-remote

      - name: Build Python sidecar
        shell: pwsh
        run: |
          python -m PyInstaller --onefile --name filesift-sidecar --collect-all transformers --collect-all torch --collect-all docling --collect-all huggingface_hub python/cli.py
          New-Item -ItemType Directory -Force src-tauri/binaries
          Copy-Item dist/filesift-sidecar.exe src-tauri/binaries/filesift-sidecar-x86_64-pc-windows-msvc.exe -Force
          src-tauri/binaries/filesift-sidecar-x86_64-pc-windows-msvc.exe models --models-dir "$env:RUNNER_TEMP\filesift-model-smoke"

      - name: Validate updater signing secrets
        if: github.event_name == 'push' || inputs.dry_run == false
        shell: bash
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "Missing GitHub secret: TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]; then
            echo "Missing GitHub secret: TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build and publish Tauri release
        if: github.event_name == 'push' || inputs.dry_run == false
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FileSift ${{ github.ref_name }}"
          releaseBody: "See the attached installers and update manifest."
          releaseDraft: false
          prerelease: false

      - name: Dry run complete
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: |
          echo "Dry-run completed: Python sidecar dependencies installed, model sources verified, and PyInstaller sidecar smoke-tested."

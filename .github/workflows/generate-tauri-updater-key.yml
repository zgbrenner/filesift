name: Generate Tauri Updater Key

on:
  workflow_dispatch:

jobs:
  generate-key:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          mkdir -p .tauri
          npm run tauri signer generate -- --ci -p "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-filesift-dev-change-me}" -w .tauri/filesift.key -f

      - name: Upload key artifact
        uses: actions/upload-artifact@v4
        with:
          name: filesift-tauri-updater-key
          path: |
            .tauri/filesift.key
            .tauri/filesift.key.pub
          retention-days: 1
